name: Deploy Admin Panel to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to EC2 (upload build only)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key" \
            build/ ec2-user@$DEPLOY_HOST:/home/ec2-user/cebee-admin-panel/build/
          rm -f ~/.ssh/deploy_key
